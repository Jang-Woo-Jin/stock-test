
server:
  port: 8080

spring:
  application:
    name: stocks

  # H2 Database
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:~/test'
    #url: 'jdbc:h2:~/test'
    username: sa
    password: password

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true

springdoc:
  packages-to-scan: kakaopay_securities.back.stocks
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /api-docs
  api-docs:
    enabled: true
    groups:
      enabled: false